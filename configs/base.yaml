seed: 42

dataset:
  n_train: 2000
  n_val: 250
  n_test: 250
  n_particles: 16
  box_size: 6.0
  min_dist: 0.8
  max_position_attempts: 5000

physics:
  q0: 1.0
  alpha_charge_transfer: 0.15
  charge_transfer_length: 1.2
  charge_cutoff: 2.0
  eps_sr_same: 2.0
  eps_sr_opposite: 1.2
  rho_sr_same: 0.7
  rho_sr_opposite: 0.85
  short_range_cutoff: 2.5
  k_lr: 1.0
  softening: 0.35

output:
  path: data/processed/toy_les_dataset.npz

model:
  n_species: 2
  n_rbf: 16
  hidden_dim: 64
  encoder_hidden_dims: [64, 64]
  head_hidden_dims: [64, 32]
  short_range_cutoff: 2.5
  long_range_strength: 1.0
  long_range_softening: 0.35
  neutralize_charges: true

train:
  batch_size: 64
  epochs: 150
  lr: 0.001
  weight_decay: 0.0
  energy_weight: 1.0
  force_weight: 100.0
  grad_clip_norm: 5.0
  device: cpu
  log_interval: 10
  run_name: null
  save_dir: outputs/runs
